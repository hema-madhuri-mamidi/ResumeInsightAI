{% extends "base.html" %}

{% block title %}Result{% endblock %}

{% block content %}
<div class="results-page">
    <div class="report-actions" aria-label="Report actions">
        <button class="report-btn report-btn-primary" id="download-pdf-btn" type="button">📄 Download Analysis Report</button>
        <button class="report-btn" id="print-report-btn" type="button">🖨️ Print Report</button>
    </div>
    <div id="results-hero" class="results-hero" aria-live="polite"></div>
    <div class="results-shell">
        <aside class="results-nav-shell">
            <button class="results-nav-toggle" id="results-nav-toggle" type="button" aria-expanded="false" aria-controls="results-nav">
                <span>☰</span>
                <span>Sections</span>
            </button>
            <nav class="results-nav" id="results-nav" aria-label="Results sections"></nav>
        </aside>
        <div class="results-content">
            <div id="results-container" class="results-content-stack" aria-live="polite"></div>
        </div>
    </div>
</div>
{% endblock %}
